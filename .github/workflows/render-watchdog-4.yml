name: Keep RononBot Alive — Layer 4 (every 5min, +3min offset)

on:
  schedule:
    - cron: '3-59/5 * * * *'   # :03, :08, :13...
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping RononBot (layer 4)
        id: check
        env:
          RENDER_URL: ${{ secrets.RENONBOT_URL }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 --retry 2 \
            "${RENDER_URL}/health" || echo "000")
          echo "RononBot: $STATUS"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::RononBot not responding (layer 4)!"
          fi

      - name: Alert owner via Telegram if down
        if: steps.check.outputs.status != '200'
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          OWNER_ID: ${{ secrets.OWNER_ID }}
        run: |
          if [ -z "$BOT_TOKEN" ] || [ -z "$OWNER_ID" ]; then
            echo "BOT_TOKEN/OWNER_ID not set, skipping alert"
            exit 0
          fi
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${OWNER_ID}" \
            -d text="⚠️ RononBot health check failed (status: ${{ steps.check.outputs.status }})" \
            || true
