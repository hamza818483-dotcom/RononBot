name: Keep RononBot Alive — Layer 1 (every 5min)

# 4-layer watchdog, staggered offsets (0,1,2,3 min after each 5-min mark)
# so even if one GH Actions run is delayed/queued, others still cover.
# Single Render URL (no secondary) — RononBot has one instance.

on:
  schedule:
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping RononBot (layer 1)
        id: check
        env:
          RENDER_URL: ${{ secrets.RENONBOT_URL }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 --retry 2 \
            "${RENDER_URL}/health" || echo "000")
          echo "RononBot: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::RononBot not responding (layer 1)!"
            echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          fi

      - name: Alert owners via Telegram if down
        if: steps.check.outputs.status != '200'
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          OWNER_IDS: ${{ secrets.OWNER_IDS }}
        run: |
          if [ -z "$BOT_TOKEN" ] || [ -z "$OWNER_IDS" ]; then
            exit 0
          fi
          IFS=',' read -ra IDS <<< "$OWNER_IDS"
          for oid in "${IDS[@]}"; do
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              -d chat_id="${oid}" \
              -d text="⚠️ RononBot health check failed (status: ${{ steps.check.outputs.status }}) — Layer 1" \
              || true
          done
